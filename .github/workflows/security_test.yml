name: Security Penetration Test

on:
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - full
          - both

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create scanning directory
        run: mkdir -p scanning

      # ── Baseline Scan ──────────────────────────────────────────
      - name: Run Baseline Scan
        if: ${{ inputs.scan_type == 'baseline' || inputs.scan_type == 'both' }}
        run: |
          docker run --rm \
            -v $(pwd)/scanning:/zap/wrk:rw \
            zaproxy/zap-stable zap-baseline.py \
            -t https://kevin-nest.vercel.app \
            -r report.html \
            -I

      # ── Full Scan ──────────────────────────────────────────────
      - name: Run Full Scan
        if: ${{ inputs.scan_type == 'full' || inputs.scan_type == 'both' }}
        run: |
          docker run --rm \
            -v $(pwd)/scanning:/zap/wrk:rw \
            zaproxy/zap-stable zap-full-scan.py \
            -t https://kevin-nest.vercel.app \
            -r full-report.html \
            -I

      # ── Authenticated Admin Scan ───────────────────────────────
      - name: Create Auth Context
        if: ${{ inputs.scan_type == 'full' || inputs.scan_type == 'both' }}
        run: |
          cat > scanning/auth.context << 'EOF'
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <configuration>
            <context>
              <name>Admin Auth</name>
              <desc/>
              <inscope>true</inscope>
              <incregexes>https://kevin-nest.vercel.app.*</incregexes>
              <users>
                <user>
                  <id>1</id>
                  <name>admin</name>
                  <credentials>
                    <credential>
                      <name>Cookie</name>
                      <value>admin-auth=${{ secrets.ADMIN_COOKIE }}</value>
                    </credential>
                  </credentials>
                </user>
              </users>
            </context>
          </configuration>
          EOF

      - name: Run Authenticated Admin Scan
        if: ${{ inputs.scan_type == 'full' || inputs.scan_type == 'both' }}
        run: |
          docker run --rm \
            -v $(pwd)/scanning:/zap/wrk:rw \
            zaproxy/zap-stable zap-full-scan.py \
            -t https://kevin-nest.vercel.app/admin \
            -n /zap/wrk/auth.context \
            -U admin \
            -r admin-report.html \
            -I

      # ── Upload Reports ─────────────────────────────────────────
      - name: Upload Scan Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-reports
          path: scanning/*.html
          retention-days: 30

      # ── Ensure report exists for agent ────────────────────────
      - name: Ensure report files exist
        run: |
          touch scanning/report.html
          touch scanning/full-report.html
          touch scanning/admin-report.html

      # ── Claude/GitHub Models Agent ─────────────────────────────
      - name: Run Security Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/security-agent.mjs